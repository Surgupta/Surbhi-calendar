<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet"/>
<title>Surbhi's 2026 Calendar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, sans-serif; background: #3B1A08; padding: 1.25rem; min-height: 100vh; position: relative; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url('https://surgupta.github.io/April-calendar/bg.jpg'); background-size: cover; background-position: center; background-attachment: fixed; opacity: 0.45; z-index: 0; pointer-events: none; }
  .wrap-inner { position: relative; z-index: 1; }
  .surbhi-title { text-align: center; margin-bottom: 1rem; font-family: 'Playfair Display', serif; font-size: 26px; font-style: italic; font-weight: 600; letter-spacing: 0.08em; background: linear-gradient(90deg, #fff 0%, #fffde7 20%, #fff9c4 35%, #ffffff 50%, #fff9c4 65%, #fffde7 80%, #fff 100%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: shimmer 4s linear infinite; filter: drop-shadow(0px 0px 6px rgba(255,255,255,0.8)) drop-shadow(0px 0px 12px rgba(255,255,255,0.4)); }
  @keyframes shimmer { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .cal-month-title { font-family: Georgia, serif; font-size: 34px; font-weight: 400; color: #F5E6D0; line-height: 1; }
  .cal-year-sub { font-size: 26px; font-weight: 400; color: #A0785A; }
  .nav-btns { display: flex; align-items: center; gap: 10px; }
  .nav-btn { background: #7A4A28; border: 1px solid #A0785A; color: #F5E6D0; border-radius: 8px; padding: 6px 16px; font-size: 18px; cursor: pointer; font-family: Georgia, serif; transition: background 0.15s; }
  .nav-btn:hover { background: #C8956C; color: #2C1A0E; }
  .saved-badge { font-size: 11px; color: #2C1A0E; background: #C8956C; border-radius: 20px; padding: 3px 10px; display: none; }
  .goals-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; }
  .goal-chip { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; border: 1px solid #A0785A; background: #7A4A28; font-family: 'Open Sans', sans-serif; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
  .goal-chip:hover { border-color: #E8A87C; background: #8B5E3C; }
  .goal-chip span { color: #F5E6D0; }
  .add-chip { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-family: 'Open Sans', sans-serif; font-weight: 700; letter-spacing: 0.04em; background: none; border: 1px dashed #A0785A; color: #E8C9A0; cursor: pointer; text-transform: uppercase; }
  .add-chip:hover { background: #7A4A28; border-color: #E8A87C; color: #F5E6D0; }
  .day-labels { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 3px; }
  .dl { text-align: center; font-size: 13px; font-weight: 700; color: #F5E6D0; padding: 6px 0; letter-spacing: 0.05em; text-transform: uppercase; font-family: Aptos, 'Segoe UI', sans-serif; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cell { border: 1px solid #8B5E3C; border-radius: 8px; min-height: 90px; cursor: pointer; position: relative; overflow: hidden; padding: 5px; transition: border-color 0.15s; }
  .cell.chess-a { background: #C49A6C; }
  .cell.chess-b { background: #E8C99A; }
  .cell:hover { border-color: #F5E6D0; filter: brightness(1.08); }
  .cell.empty { background: transparent; border-color: transparent; cursor: default; pointer-events: none; filter: none; }
  .cell.today { border: 2px solid #fff; }
  .cell.has-data.chess-a { background: #BA8E60; }
  .cell.has-data.chess-b { background: #DDB97A; }
  .cell-num { font-size: 14px; font-weight: 700; color: #3D1F0A; position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: center; }
  .today-pip { width: 6px; height: 6px; border-radius: 50%; background: #3D1F0A; display: inline-block; }
  .cell-dots { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; position: relative; z-index: 2; }
  .cell-pct { font-size: 10px; font-family: 'Open Sans', sans-serif; font-weight: 700; color: #3D1F0A; margin-top: 2px; letter-spacing: 0.02em; position: relative; z-index: 2; }
  .cell-note { font-size: 11px; font-family: 'Open Sans', sans-serif; font-weight: 700; color: #3D1F0A; margin-top: 4px; line-height: 1.4; word-break: break-word; position: relative; z-index: 2; letter-spacing: 0.02em; }
  .floral { position: absolute; bottom: 0; right: 0; opacity: 0.28; pointer-events: none; z-index: 1; }
  .modal-overlay { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #7A4A28; border-radius: 14px; border: 1px solid #A0785A; padding: 1.25rem; width: 310px; max-width: 92vw; }
  .modal-hd { font-size: 16px; font-weight: 500; color: #F5E6D0; margin-bottom: 12px; font-family: Georgia, serif; }
  .modal textarea { width: 100%; height: 75px; resize: none; font-size: 13px; font-family: 'Open Sans', sans-serif; font-weight: 700; letter-spacing: 0.02em; padding: 8px; border-radius: 8px; border: 1px solid #A0785A; background: #6B3F1F; color: #F5E6D0; outline: none; margin-bottom: 10px; box-sizing: border-box; line-height: 1.6; }
  .modal textarea:focus { border-color: #E8A87C; }
  .modal textarea::placeholder { color: #A0785A; font-weight: 400; }
  .modal-gl { font-size: 12px; color: #E8C9A0; margin-bottom: 6px; }
  .modal-checks { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .modal-check { display: flex; align-items: center; gap: 7px; font-size: 13px; color: #F5E6D0; cursor: pointer; }
  .modal-check input { cursor: pointer; accent-color: #C8956C; }
  .modal-acts { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-s { font-size: 13px; background: #C8956C; color: #2C1A0E; border: none; border-radius: 8px; padding: 7px 16px; cursor: pointer; font-family: sans-serif; font-weight: 500; }
  .btn-s:hover { background: #E8A87C; }
  .btn-c { font-size: 13px; background: none; color: #A0785A; border: 1px solid #7A5C42; border-radius: 8px; padding: 7px 14px; cursor: pointer; font-family: sans-serif; }
  .btn-c:hover { background: #2C1A0E; }
  .btn-del { font-size: 13px; background: none; color: #E8735A; border: 1px solid #7A3B28; border-radius: 8px; padding: 7px 14px; cursor: pointer; font-family: sans-serif; }
  .btn-del:hover { background: #7A3B28; color: #F5E6D0; }
  .edit-modal { background: #7A4A28; border-radius: 14px; border: 1px solid #A0785A; padding: 1.25rem; width: 310px; max-width: 92vw; }
  .edit-modal input { width: 100%; font-size: 13px; padding: 7px 9px; border-radius: 8px; border: 1px solid #A0785A; background: #6B3F1F; color: #F5E6D0; font-family: sans-serif; outline: none; margin-bottom: 10px; box-sizing: border-box; }
  .edit-modal input:focus { border-color: #E8A87C; }
  .color-label { font-size: 12px; color: #E8C9A0; margin-bottom: 8px; }
  .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .swatch { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: border-color 0.15s, transform 0.15s; }
  .swatch:hover { transform: scale(1.15); }
  .swatch.sel { border-color: #F5E6D0; transform: scale(1.15); }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; color: #F5E6D0; font-family: 'Open Sans', sans-serif; letter-spacing: 0.04em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="wrap-inner">
  <div class="surbhi-title">✦ Surbhi's Personal Calendar ✦</div>
  <div class="cal-head">
    <div>
      <div class="cal-month-title" id="calMonthTitle">May <span class="cal-year-sub">2026</span></div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="prevMonth()">&#8592;</button>
      <span class="saved-badge" id="savedBadge">✓ saved</span>
      <button class="nav-btn" onclick="nextMonth()">&#8594;</button>
    </div>
  </div>
  <div class="goals-row" id="goalsRow"></div>
  <div class="day-labels">
    <div class="dl">Sun</div><div class="dl">Mon</div><div class="dl">Tue</div>
    <div class="dl">Wed</div><div class="dl">Thu</div><div class="dl">Fri</div><div class="dl">Sat</div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="legend" id="legend"></div>
</div>

<div class="modal-overlay" id="dayOverlay">
  <div class="modal">
    <div class="modal-hd" id="dayTitle">May 1</div>
    <textarea id="dayNote" placeholder="Scribble your notes here..."></textarea>
    <div class="modal-gl">Goals worked on today:</div>
    <div class="modal-checks" id="dayChecks"></div>
    <div class="modal-acts">
      <button class="btn-c" onclick="closeDay()">Cancel</button>
      <button class="btn-s" onclick="saveDay()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editOverlay">
  <div class="edit-modal">
    <div class="modal-hd" id="editTitle">Edit goal</div>
    <input type="text" id="editInput" placeholder="Goal name..." />
    <div class="color-label">Pick a color:</div>
    <div class="color-swatches" id="colorSwatches"></div>
    <div class="modal-acts">
      <button class="btn-c" onclick="closeEdit()">Cancel</button>
      <button class="btn-del" id="deleteGoalBtn" onclick="deleteGoal()" style="display:none;">Delete</button>
      <button class="btn-s" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'surbhi_2026_calendar';
const COLORS = ['#FF6B9D','#7C5CFC','#00D4AA','#FF4757','#FFD700','#FF8C42','#00B4D8','#C8FF00'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_IN_MONTH = [31,28,31,30,31,30,31,31,30,31,30,31];

const SHAPES = [
  (c) => `<svg width="10" height="10" viewBox="0 0 10 10"><polygon points="5,1 9,9 1,9" fill="${c}"/></svg>`,
  (c) => `<svg width="10" height="10" viewBox="0 0 10 10"><rect x="1" y="1" width="8" height="8" fill="${c}"/></svg>`,
  (c) => `<svg width="10" height="10" viewBox="0 0 10 10"><polygon points="5,1 9,4 7,9 3,9 1,4" fill="${c}"/></svg>`,
  (c) => `<svg width="10" height="10" viewBox="0 0 10 10"><polygon points="5,1 6.5,4 10,4 7,6.5 8,10 5,8 2,10 3,6.5 0,4 3.5,4" fill="${c}"/></svg>`,
  (c) => `<svg width="10" height="10" viewBox="0 0 10 10"><rect x="1" y="1" width="8" height="8" rx="2" fill="${c}"/></svg>`,
  (c) => `<svg width="10" height="10" viewBox="0 0 10 10"><polygon points="5,0 10,5 5,10 0,5" fill="${c}"/></svg>`,
  (c) => `<svg width="10" height="10" viewBox="0 0 10 10"><polygon points="5,1 9,9 1,9" fill="none" stroke="${c}" stroke-width="1.5"/></svg>`,
  (c) => `<svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="none" stroke="${c}" stroke-width="1.5"/></svg>`,
];

function goalShape(id, color) {
  const fn = SHAPES[(id - 1) % SHAPES.length];
  return `<span style="display:inline-flex;align-items:center;">${fn(color)}</span>`;
}

const FLORALS = [
  `<svg width="58" height="58" viewBox="0 0 58 58" fill="none"><path d="M29 8 C31 14, 36 18, 29 24 C22 18, 27 14, 29 8Z" fill="#C8956C"/><path d="M29 8 C31 14, 36 18, 29 24 C22 18, 27 14, 29 8Z" fill="#C8956C" transform="rotate(45 29 29)"/><path d="M29 8 C31 14, 36 18, 29 24 C22 18, 27 14, 29 8Z" fill="#E8A87C" transform="rotate(90 29 29)"/><path d="M29 8 C31 14, 36 18, 29 24 C22 18, 27 14, 29 8Z" fill="#C8956C" transform="rotate(135 29 29)"/><path d="M29 8 C31 14, 36 18, 29 24 C22 18, 27 14, 29 8Z" fill="#E8A87C" transform="rotate(180 29 29)"/><path d="M29 8 C31 14, 36 18, 29 24 C22 18, 27 14, 29 8Z" fill="#C8956C" transform="rotate(225 29 29)"/><path d="M29 8 C31 14, 36 18, 29 24 C22 18, 27 14, 29 8Z" fill="#E8A87C" transform="rotate(270 29 29)"/><path d="M29 8 C31 14, 36 18, 29 24 C22 18, 27 14, 29 8Z" fill="#C8956C" transform="rotate(315 29 29)"/><circle cx="29" cy="29" r="7" fill="#7A5C42"/><circle cx="27" cy="27" r="1.2" fill="#F5E6D0"/><circle cx="29" cy="26" r="1.2" fill="#F5E6D0"/><circle cx="31" cy="27" r="1.2" fill="#F5E6D0"/><circle cx="31" cy="29" r="1.2" fill="#F5E6D0"/><circle cx="29" cy="31" r="1.2" fill="#F5E6D0"/></svg>`,
  `<svg width="54" height="54" viewBox="0 0 54 54" fill="none"><path d="M27 6 C24 10 24 16 27 20 C30 16 30 10 27 6Z" fill="#D4537E"/><path d="M27 6 C24 10 24 16 27 20 C30 16 30 10 27 6Z" fill="#E8A87C" transform="rotate(60 27 27)"/><path d="M27 6 C24 10 24 16 27 20 C30 16 30 10 27 6Z" fill="#D4537E" transform="rotate(120 27 27)"/><path d="M27 6 C24 10 24 16 27 20 C30 16 30 10 27 6Z" fill="#E8A87C" transform="rotate(180 27 27)"/><path d="M27 6 C24 10 24 16 27 20 C30 16 30 10 27 6Z" fill="#D4537E" transform="rotate(240 27 27)"/><path d="M27 6 C24 10 24 16 27 20 C30 16 30 10 27 6Z" fill="#E8A87C" transform="rotate(300 27 27)"/><circle cx="27" cy="27" r="6" fill="#7A3B28"/><circle cx="25.5" cy="26" r="1" fill="#F5E6D0"/><circle cx="27" cy="25" r="1" fill="#F5E6D0"/><circle cx="28.5" cy="26" r="1" fill="#F5E6D0"/><circle cx="28.5" cy="28" r="1" fill="#F5E6D0"/><circle cx="27" cy="29" r="1" fill="#F5E6D0"/></svg>`,
  `<svg width="52" height="52" viewBox="0 0 52 52" fill="none"><path d="M26 5 Q30 13 26 21 Q22 13 26 5Z" fill="#C8956C"/><path d="M26 5 Q30 13 26 21 Q22 13 26 5Z" fill="#A0785A" transform="rotate(51.4 26 26)"/><path d="M26 5 Q30 13 26 21 Q22 13 26 5Z" fill="#C8956C" transform="rotate(102.8 26 26)"/><path d="M26 5 Q30 13 26 21 Q22 13 26 5Z" fill="#A0785A" transform="rotate(154.2 26 26)"/><path d="M26 5 Q30 13 26 21 Q22 13 26 5Z" fill="#C8956C" transform="rotate(205.6 26 26)"/><path d="M26 5 Q30 13 26 21 Q22 13 26 5Z" fill="#A0785A" transform="rotate(257.1 26 26)"/><path d="M26 5 Q30 13 26 21 Q22 13 26 5Z" fill="#C8956C" transform="rotate(308.5 26 26)"/><circle cx="26" cy="26" r="6.5" fill="#5C3D1E"/><circle cx="24" cy="25" r="1.1" fill="#E8A87C"/><circle cx="26" cy="23.5" r="1.1" fill="#E8A87C"/><circle cx="28" cy="25" r="1.1" fill="#E8A87C"/><circle cx="27.5" cy="27.5" r="1.1" fill="#E8A87C"/><circle cx="24.5" cy="27.5" r="1.1" fill="#E8A87C"/></svg>`,
  `<svg width="56" height="56" viewBox="0 0 56 56" fill="none"><path d="M28 7 C22 14 22 20 28 25 C34 20 34 14 28 7Z" fill="#E8A87C"/><path d="M28 7 C22 14 22 20 28 25 C34 20 34 14 28 7Z" fill="#C8956C" transform="rotate(72 28 28)"/><path d="M28 7 C22 14 22 20 28 25 C34 20 34 14 28 7Z" fill="#E8A87C" transform="rotate(144 28 28)"/><path d="M28 7 C22 14 22 20 28 25 C34 20 34 14 28 7Z" fill="#C8956C" transform="rotate(216 28 28)"/><path d="M28 7 C22 14 22 20 28 25 C34 20 34 14 28 7Z" fill="#E8A87C" transform="rotate(288 28 28)"/><circle cx="28" cy="28" r="7" fill="#3D1F0A"/><circle cx="26" cy="27" r="1.3" fill="#C8956C"/><circle cx="28" cy="25.5" r="1.3" fill="#C8956C"/><circle cx="30" cy="27" r="1.3" fill="#C8956C"/><circle cx="30" cy="29.5" r="1.3" fill="#C8956C"/><circle cx="28" cy="31" r="1.3" fill="#C8956C"/></svg>`,
  `<svg width="50" height="50" viewBox="0 0 50 50" fill="none"><path d="M25 5 C20 10 19 17 25 22 C31 17 30 10 25 5Z" fill="#D4537E"/><path d="M25 5 C20 10 19 17 25 22 C31 17 30 10 25 5Z" fill="#C8956C" transform="rotate(90 25 25)"/><path d="M25 5 C20 10 19 17 25 22 C31 17 30 10 25 5Z" fill="#D4537E" transform="rotate(180 25 25)"/><path d="M25 5 C20 10 19 17 25 22 C31 17 30 10 25 5Z" fill="#C8956C" transform="rotate(270 25 25)"/><path d="M25 5 C20 10 19 17 25 22 C31 17 30 10 25 5Z" fill="#E8A87C" transform="rotate(45 25 25)"/><path d="M25 5 C20 10 19 17 25 22 C31 17 30 10 25 5Z" fill="#A0785A" transform="rotate(135 25 25)"/><path d="M25 5 C20 10 19 17 25 22 C31 17 30 10 25 5Z" fill="#E8A87C" transform="rotate(225 25 25)"/><path d="M25 5 C20 10 19 17 25 22 C31 17 30 10 25 5Z" fill="#A0785A" transform="rotate(315 25 25)"/><circle cx="25" cy="25" r="6" fill="#5C3D1E"/><circle cx="23.5" cy="24" r="1" fill="#F5E6D0"/><circle cx="25" cy="23" r="1" fill="#F5E6D0"/><circle cx="26.5" cy="24" r="1" fill="#F5E6D0"/><circle cx="26.5" cy="26" r="1" fill="#F5E6D0"/><circle cx="25" cy="27" r="1" fill="#F5E6D0"/></svg>`
];

const DEFAULT_GOALS = [
  {id:1, text:'Exercise for 20 mins', color: COLORS[0]},
  {id:2, text:'Meditate for 10 mins', color: COLORS[1]},
  {id:3, text:'Walk 7,000 steps a day', color: COLORS[2]},
  {id:4, text:'Read for 15 mins', color: COLORS[3]},
  {id:5, text:'Take sunlight', color: COLORS[4]},
  {id:6, text:'Do skincare', color: COLORS[5]},
  {id:7, text:'Eat one healthy meal', color: COLORS[6]},
  {id:8, text:'Eat one fruit a day', color: COLORS[7]},
  {id:9, text:'Drink warm water', color: COLORS[0]},
];

function migrateAprilData(data) {
  try {
    const oldRaw = localStorage.getItem('april_fy26_calendar');
    if (!oldRaw) return;
    const old = JSON.parse(oldRaw);
    // Migrate goals
    if (old.goals && old.goals.length) {
      data.goals = old.goals;
      data.nextId = old.nextId || 10;
    }
    // Migrate April day data into month 3 (April = index 3)
    if (old.dayData) {
      if (!data.monthData['2026_3']) data.monthData['2026_3'] = {};
      Object.keys(old.dayData).forEach(d => {
        data.monthData['2026_3'][d] = old.dayData[d];
      });
    }
    // Save migrated data and remove old key
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    localStorage.removeItem('april_fy26_calendar');
    console.log('April data migrated successfully!');
  } catch(e) { console.log('Migration error:', e); }
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
    // First load — check for old April data to migrate
    const fresh = { goals: DEFAULT_GOALS, monthData: {}, nextId: 10 };
    migrateAprilData(fresh);
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || JSON.stringify(fresh));
  } catch(e) {}
  return { goals: DEFAULT_GOALS, monthData: {}, nextId: 10 };
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ goals, monthData, nextId }));
    const badge = document.getElementById('savedBadge');
    badge.style.display = 'inline-block';
    setTimeout(() => badge.style.display = 'none', 2000);
  } catch(e) {}
}

let { goals, monthData, nextId } = loadData();
let editingDay = null, editingGoal = null, editColor = COLORS[0];

// Start at current month, clamp to Jan-Dec 2026
const now = new Date();
let currentMonth = (now.getFullYear() === 2026) ? now.getMonth() : 4; // default May

function getDaysInMonth(m) {
  if (m === 1) return 29; // 2026 is not a leap year actually — Feb has 28
  return DAYS_IN_MONTH[m];
}

function getMonthKey(m) { return `2026_${m}`; }

function getDayData(m, d) {
  const mk = getMonthKey(m);
  return (monthData[mk] && monthData[mk][d]) ? monthData[mk][d] : {};
}

function setDayData(m, d, data) {
  const mk = getMonthKey(m);
  if (!monthData[mk]) monthData[mk] = {};
  monthData[mk][d] = data;
}

function prevMonth() {
  if (currentMonth > 0) { currentMonth--; renderAll(); }
}
function nextMonth() {
  if (currentMonth < 11) { currentMonth++; renderAll(); }
}

function renderAll() {
  // Update header
  document.getElementById('calMonthTitle').innerHTML = `${MONTHS[currentMonth]} <span class="cal-year-sub">2026</span>`;
  renderGoals();
}

function renderGoals() {
  const row = document.getElementById('goalsRow');
  row.innerHTML = '';
  goals.forEach(g => {
    const chip = document.createElement('div');
    chip.className = 'goal-chip';
    chip.innerHTML = `${goalShape(g.id, g.color)}<span>${g.text}</span>`;
    chip.onclick = () => openEdit(g);
    row.appendChild(chip);
  });
  const add = document.createElement('button');
  add.className = 'add-chip';
  add.textContent = '+ add goal';
  add.onclick = () => openEdit(null);
  row.appendChild(add);
  renderLegend();
  renderGrid();
}

function renderLegend() {
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  goals.forEach(g => {
    const d = document.createElement('div');
    d.className = 'legend-item';
    d.innerHTML = `${goalShape(g.id, g.color)}<span>${g.text}</span>`;
    leg.appendChild(d);
  });
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const m = currentMonth;
  const daysInMonth = getDaysInMonth(m);
  const startDay = new Date(2026, m, 1).getDay();
  const today = new Date();
  const todayD = (today.getFullYear() === 2026 && today.getMonth() === m) ? today.getDate() : null;

  for (let i = 0; i < startDay; i++) {
    const e = document.createElement('div'); e.className = 'cell empty'; grid.appendChild(e);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    const data = getDayData(m, d);
    const hasData = (data.note && data.note.trim()) || (data.checked && data.checked.length);
    const col = (d + startDay) % 2 === 0 ? ' chess-a' : ' chess-b';
    cell.className = 'cell' + (d === todayD ? ' today' : '') + (hasData ? ' has-data' : '') + col;
    cell.onclick = () => openDay(d);
    const floral = document.createElement('div');
    floral.className = 'floral';
    floral.innerHTML = FLORALS[d % FLORALS.length];
    cell.appendChild(floral);
    let inner = `<div class="cell-num"><span>${d}</span>${d === todayD ? '<span class="today-pip"></span>' : ''}</div>`;
    if (data.checked && data.checked.length) {
      inner += '<div class="cell-dots">';
      data.checked.forEach(gid => {
        const g = goals.find(x => x.id === gid);
        if (g) inner += goalShape(g.id, g.color);
      });
      inner += '</div>';
      const pct = Math.round((data.checked.length / goals.length) * 100);
      inner += `<div class="cell-pct">Done — ${pct}%</div>`;
    }
    if (data.note && data.note.trim()) inner += `<div class="cell-note">${data.note.substring(0, 45)}${data.note.length > 45 ? '…' : ''}</div>`;
    const inner_div = document.createElement('div');
    inner_div.style.position = 'relative'; inner_div.style.zIndex = '2';
    inner_div.innerHTML = inner;
    cell.appendChild(inner_div);
    grid.appendChild(cell);
  }
}

function openDay(d) {
  editingDay = d;
  const data = getDayData(currentMonth, d);
  document.getElementById('dayTitle').textContent = `${MONTHS[currentMonth]} ${d}, 2026`;
  document.getElementById('dayNote').value = data.note || '';
  const checks = document.getElementById('dayChecks');
  checks.innerHTML = '';
  goals.forEach(g => {
    const checked = data.checked && data.checked.includes(g.id);
    const lbl = document.createElement('label');
    lbl.className = 'modal-check';
    lbl.innerHTML = `<input type="checkbox" value="${g.id}" ${checked ? 'checked' : ''}>${goalShape(g.id, g.color)}<span>${g.text}</span>`;
    checks.appendChild(lbl);
  });
  document.getElementById('dayOverlay').classList.add('open');
  setTimeout(() => document.getElementById('dayNote').focus(), 50);
}

function closeDay() { document.getElementById('dayOverlay').classList.remove('open'); editingDay = null; }

function saveDay() {
  const note = document.getElementById('dayNote').value;
  const cbs = document.querySelectorAll('#dayChecks input[type=checkbox]');
  const checked = [];
  cbs.forEach(cb => { if (cb.checked) checked.push(parseInt(cb.value)); });
  setDayData(currentMonth, editingDay, { note, checked });
  saveData(); closeDay(); renderGrid();
}

function renderSwatches() {
  const sw = document.getElementById('colorSwatches');
  sw.innerHTML = '';
  COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'swatch' + (c === editColor ? ' sel' : '');
    s.style.background = c;
    s.addEventListener('click', () => { editColor = c; renderSwatches(); });
    sw.appendChild(s);
  });
}

function openEdit(g) {
  editingGoal = g;
  document.getElementById('editTitle').textContent = g ? 'Edit goal' : 'Add goal';
  document.getElementById('editInput').value = g ? g.text : '';
  editColor = g ? g.color : COLORS[0];
  document.getElementById('deleteGoalBtn').style.display = g ? 'inline-block' : 'none';
  renderSwatches();
  document.getElementById('editOverlay').classList.add('open');
  setTimeout(() => document.getElementById('editInput').focus(), 50);
}

function closeEdit() { document.getElementById('editOverlay').classList.remove('open'); editingGoal = null; }

function deleteGoal() {
  if (!editingGoal) return;
  goals = goals.filter(g => g.id !== editingGoal.id);
  Object.keys(monthData).forEach(mk => {
    Object.keys(monthData[mk]).forEach(d => {
      if (monthData[mk][d].checked) monthData[mk][d].checked = monthData[mk][d].checked.filter(id => id !== editingGoal.id);
    });
  });
  saveData(); closeEdit(); renderGoals();
}

function saveEdit() {
  const text = document.getElementById('editInput').value.trim() || 'Goal';
  if (editingGoal) { editingGoal.text = text; editingGoal.color = editColor; }
  else { goals.push({ id: nextId++, text, color: editColor }); }
  saveData(); closeEdit(); renderGoals();
}

document.getElementById('dayOverlay').addEventListener('click', e => { if (e.target === document.getElementById('dayOverlay')) closeDay(); });
document.getElementById('editOverlay').addEventListener('click', e => { if (e.target === document.getElementById('editOverlay')) closeEdit(); });

renderAll();
</script>
</body>
